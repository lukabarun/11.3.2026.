<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Forma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="text-center mb-4">Registracijska forma</h2>

    <form>

      <!-- Ime -->
      <div class="mb-3">
        <label class="form-label">Ime</label>
        <input type="text" class="form-control" placeholder="Unesite ime" required>
      </div>

      <!-- Prezime -->
      <div class="mb-3">
        <label class="form-label">Prezime</label>
        <input type="text" class="form-control" placeholder="Unesite prezime" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Unesite email" required>
      </div>

      <!-- Lozinka -->
      <div class="mb-3">
        <label class="form-label">Lozinka</label>
        <input type="password" class="form-control" placeholder="Unesite lozinku" required>
      </div>

      <!-- Grad (select) -->
      <div class="mb-3">
        <label class="form-label">Grad</label>
        <select class="form-select">
          <option selected>Odaberite grad</option>
          <option>Sarajevo</option>
          <option>Mostar</option>
          <option>Tuzla</option>
          <option>Livno</option>
        </select>
      </div>

      <!-- Spol (radio) -->
      <div class="mb-3">
        <label class="form-label d-block">Spol</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="spol">
          <label class="form-check-label">Muški</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="spol">
          <label class="form-check-label">Ženski</label>
        </div>
      </div>

      <!-- Poruka -->
      <div class="mb-3">
        <label class="form-label">Poruka</label>
        <textarea class="form-control" rows="3"></textarea>
      </div>

      <!-- Checkbox -->
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input">
        <label class="form-check-label">Prihvaćam uvjete korištenja</label>
      </div>

      <!-- Dugme -->
      <button type="submit" class="btn btn-primary w-100">Pošalji</button>

    </form>
  </div>
</div>

</body>
</html>
